<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Japanese TV Channel Guide — Watch Japanese TV Online for Immersion Learning</title>
  <meta name="description" content="Watch Japanese TV networks (NHK, ANN, TBS, Nippon TV, Fuji, TV Tokyo, Weathernews) live or their latest uploads on YouTube — free immersion listening practice for Japanese learners.">
  <link rel="canonical" href="https://yudataguy.github.io/Awesome-Japanese/tv/">
  <meta name="theme-color" content="#0d0e12">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Awesome Japanese">
  <meta property="og:title" content="Japanese TV Channel Guide — Watch Japanese TV Online">
  <meta property="og:description" content="Watch Japanese TV networks live or their latest uploads on YouTube — free immersion listening practice for Japanese learners.">
  <meta property="og:url" content="https://yudataguy.github.io/Awesome-Japanese/tv/">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Japanese TV Channel Guide — Watch Japanese TV Online">
  <meta name="twitter:description" content="Watch Japanese TV networks live or their latest uploads for immersion listening practice.">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Japanese TV Channel Guide",
    "url": "https://yudataguy.github.io/Awesome-Japanese/tv/",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "Web",
    "description": "Watch Japanese TV networks live or their latest uploads on YouTube for immersion listening practice.",
    "isPartOf": { "@type": "WebSite", "name": "Awesome Japanese", "url": "https://yudataguy.github.io/Awesome-Japanese/" },
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>

  <link rel="stylesheet" href="tv.css">
</head>
<body>
  <h1 class="sr-only">Japanese TV Channel Guide — watch Japanese TV online for immersion learning</h1>

  <div class="app" id="app">
    <div class="top">
      <div class="video">
        <div class="player-frame">
          <!-- The YouTube IFrame Player API replaces this div with an iframe. -->
          <div id="player"></div>
        </div>
      </div>
      <aside class="info" id="info" aria-live="polite"><!-- filled by tv.js --></aside>
    </div>

    <button class="guidebar" id="guidebar" type="button">⌄&nbsp; HIDE GUIDE&nbsp; 番組表をたたむ</button>

    <div class="guide" id="epg"><!-- EPG rows (epg.js) --></div>

    <div class="statusbar">
      <div class="sb-left">📺 <b>日本テレビガイド</b><span class="sb-hint">&nbsp; ・ Tune ▲▼ ・ g: guide</span></div>
      <div class="sb-right">
        <input id="tv-search" class="tv-search" type="search" placeholder="Search 検索…" aria-label="Search channels and programs" autocomplete="off">
        <button id="sb-settings" class="sb-btn" type="button" aria-label="Settings 設定" title="Settings">⚙</button>
        <button id="sb-mute" class="sb-btn" type="button" aria-label="Mute" title="Mute">🔊</button>
        <button id="sb-full" class="sb-btn" type="button" aria-label="Fullscreen" title="Fullscreen">⛶</button>
      </div>
    </div>
  </div>

  <div id="start-screen" class="start-screen" role="button" tabindex="0" aria-label="Tap to start watching">
    <div class="start-inner">
      <div class="start-brand">📺 日本テレビガイド</div>
      <div class="start-pow">⏻</div>
      <div class="start-cta">▶ クリックして視聴開始</div>
      <div class="start-hint">Tap to start ・ 136 channels live</div>
    </div>
  </div>

  <div id="settings-modal" class="modal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Settings 設定">
      <div class="modal-head"><b>SETTINGS&nbsp; 設定</b><button id="set-close" class="sb-btn" type="button">CLOSE 閉じる</button></div>
      <div class="modal-body">
        <div class="set-label">APPEARANCE&nbsp; 表示</div>
        <div class="set-row">Theme テーマ</div>
        <div class="seg" id="set-theme">
          <button type="button" data-theme-pref="auto" class="seg-btn">Auto 自動</button>
          <button type="button" data-theme-pref="light" class="seg-btn">Light</button>
          <button type="button" data-theme-pref="dark" class="seg-btn">Dark</button>
        </div>
        <div class="set-note">Auto follows your system (light → Light, dark → Dark).</div>

        <div class="set-label">PLAYBACK&nbsp; 再生</div>
        <label class="set-check"><input type="checkbox" id="set-controls"> Show video controls 再生コントロールを表示</label>
        <label class="set-check"><input type="checkbox" id="set-guide-hidden"> Start with guide hidden 番組表をたたむ</label>

        <div class="set-label">REGION&nbsp; 地域</div>
        <label class="set-check"><input type="checkbox" id="set-hide-region"> Hide region-locked channels 地域制限を隠す</label>
        <div class="set-note" id="set-region-note">Detecting…</div>
      </div>
    </div>
  </div>

  <div id="error" class="error" hidden></div>

  <!-- icons.js / schedule.js / region.js / theme.js / settings.js (first-party)
       load before tv.js (they set globalThis.* and window.*). No SRI on
       iframe_api: it is a versioned loader Google updates without a published
       hash, so pinning one would break playback on rotation. -->
  <script src="icons.js"></script>
  <script src="schedule.js"></script>
  <script src="region.js"></script>
  <script src="theme.js"></script>
  <script src="settings.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="tv.js"></script>
  <script src="epg.js"></script>
</body>
</html>
